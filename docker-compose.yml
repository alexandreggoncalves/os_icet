services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-os_icet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123qwe}
    ports:
      - "5433:5432"
    volumes:
      - os_icet_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-os_icet}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-127.0.0.1,localhost}
      POSTGRES_DB: ${POSTGRES_DB:-os_icet}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123qwe}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - os_icet_uploads:/app/uploads
      - os_icet_mailbox:/app/dev_mailbox
    depends_on:
      db:
        condition: service_healthy

volumes:
  os_icet_postgres:
  os_icet_uploads:
  os_icet_mailbox:
